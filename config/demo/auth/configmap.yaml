apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: auth-system
data:
  config.yaml: |
    issuer: https://cloud.localhost:30443/oidc/v1

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true
      responseTypes:
        - code

    staticClients:
      - id: staff-portal
        secret: demo-secret
        name: Staff Portal
        redirectURIs:
          - https://staff.localhost:30443/auth/callback
      - id: cloud-portal
        public: true
        name: Cloud Portal
        redirectURIs:
          - https://cloud.localhost:30443/auth/callback

    enablePasswordDB: true

