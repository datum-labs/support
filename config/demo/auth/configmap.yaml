apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: auth-system
data:
  config.yaml: |
    issuer: http://dex.auth-system.svc.cluster.local:5556/oidc/v1

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true
      responseTypes:
        - code

    staticClients:
      - id: staff-portal
        secret: demo-secret
        name: Staff Portal
        redirectURIs:
          - https://staff.localhost:30443/auth/callback
      - id: cloud-portal
        secret: demo-secret
        name: Cloud Portal
        redirectURIs:
          - https://cloud.localhost:30443/auth/callback

    enablePasswordDB: true

    staticPasswords:
      # email: demo@datum.net / password: password
      # (hash generated with: htpasswd -bnBC 10 "" password | tr -d ':\n')
      - email: demo@datum.net
        hash: "$2y$10$8e42G3vHp1CFPMKSMw88Bu/WiKVQtK4e2Or6.t5n6eTbBm2c3pUAC"
        username: demo
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
