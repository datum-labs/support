---
# Route /dex/* to the Dex OIDC provider
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: dex-oidc
  namespace: auth-system
spec:
  parentRefs:
    - name: default-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dex
      backendRefs:
        - name: dex
          namespace: auth-system
          port: 5556
---
# Route /oidc/v1/userinfo → Dex userinfo endpoint.
# The portals call AUTH_OIDC_ISSUER + "/oidc/v1/userinfo"; because that URL
# starts with "/" Axios replaces the path on the origin, always landing at
# https://localhost:30443/oidc/v1/userinfo regardless of the issuer path prefix.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: dex-userinfo-compat
  namespace: auth-system
spec:
  parentRefs:
    - name: default-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oidc/v1/userinfo
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /dex/userinfo
      backendRefs:
        - name: dex
          namespace: auth-system
          port: 5556
