---
# Route /oidc/v1/* to the Dex OIDC provider.
# Dex is configured with issuer http://dex.auth-system.svc.cluster.local:5556/oidc/v1
# so it natively serves auth, token, userinfo etc. under /oidc/v1/.
# This route lets the browser reach the authorization endpoint through the
# external gateway while server-side calls go to Dex directly in-cluster.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: dex-oidc
  namespace: auth-system
spec:
  parentRefs:
    - name: default-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "cloud.localhost"
    - "staff.localhost"
    - "localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oidc/v1
      backendRefs:
        - name: dex
          namespace: auth-system
          port: 5556
