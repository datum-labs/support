apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: support-system

resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - secret.yaml
  - rbac-auth-reader.yaml
  - rbac-cluster.yaml

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: support
      app.kubernetes.io/instance: support-apiserver
      app.kubernetes.io/component: apiserver
      app.kubernetes.io/part-of: support.miloapis.com
      app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/datum-cloud/support
    newTag: dev

patches:
  - target:
      kind: RoleBinding
      name: support-apiserver-auth-reader
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: kube-system
      - op: replace
        path: /subjects/0/namespace
        value: support-system
