apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Configuration
metadata:
  name: support-e2e-config
spec:
  # Run tests sequentially to avoid name collisions in the cluster-scoped API.
  parallel: 1
  timeouts:
    apply: 30s
    assert: 60s
    cleanup: 60s
    delete: 30s
    error: 60s
    exec: 30s
  skipDelete: false
  failFast: false
  delayBeforeCleanup: 2s
