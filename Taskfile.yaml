version: '3'

vars:
  TOOL_DIR: "{{.TASKFILE_DIR}}/bin"
  IMAGE_NAME: "ghcr.io/datum-cloud/support"
  IMAGE_TAG: "dev"
  CLUSTER_NAME: "support-test"
  KUBECONFIG_FILE: ".test-infra/kubeconfig"
  MILO_DIR: "{{.TASKFILE_DIR}}/.milo"
  STAFF_PORTAL_DIR: "{{.TASKFILE_DIR}}/demo/staff-portal"
  CLOUD_PORTAL_DIR: "{{.TASKFILE_DIR}}/demo/cloud-portal"

env:
  KUBECONFIG: "{{.TASKFILE_DIR}}/{{.KUBECONFIG_FILE}}"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build the support binary
    cmds:
      - |
        set -e
        echo "Building support..."
        mkdir -p {{.TOOL_DIR}}

        GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
        VERSION="v0.0.0-dev+${GIT_COMMIT:0:7}"
        GIT_TREE_STATE="clean"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          GIT_TREE_STATE="dirty"
        fi
        BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "unknown")

        go build \
          -buildvcs=false \
          -ldflags="-X 'go.miloapis.com/support/internal/version.Version=${VERSION}' \
                    -X 'go.miloapis.com/support/internal/version.GitCommit=${GIT_COMMIT}' \
                    -X 'go.miloapis.com/support/internal/version.GitTreeState=${GIT_TREE_STATE}' \
                    -X 'go.miloapis.com/support/internal/version.BuildDate=${BUILD_DATE}'" \
          -o {{.TOOL_DIR}}/support ./cmd/support
        echo "✅ Binary built: {{.TOOL_DIR}}/support"
    silent: true

  # ── Development ────────────────────────────────────────────────────────────

  dev:build:
    desc: Build the support container image
    silent: true
    cmds:
      - |
        set -e
        GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
        VERSION="v0.0.0-dev+${GIT_COMMIT:0:7}"
        GIT_TREE_STATE="clean"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          GIT_TREE_STATE="dirty"
        fi
        BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "unknown")

        docker build \
          --build-arg VERSION="${VERSION}" \
          --build-arg GIT_COMMIT="${GIT_COMMIT}" \
          --build-arg GIT_TREE_STATE="${GIT_TREE_STATE}" \
          --build-arg BUILD_DATE="${BUILD_DATE}" \
          -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} \
          .
        echo "✅ Image built: {{.IMAGE_NAME}}:{{.IMAGE_TAG}}"

  dev:load-image:
    desc: Load the support image into the KIND cluster
    silent: true
    cmds:
      - |
        set -e
        echo "Loading {{.IMAGE_NAME}}:{{.IMAGE_TAG}} into KIND cluster '{{.CLUSTER_NAME}}'..."
        kind load docker-image {{.IMAGE_NAME}}:{{.IMAGE_TAG}} --name {{.CLUSTER_NAME}}
        echo "✅ Image loaded"

  dev:deploy:
    desc: Deploy support to the test cluster
    silent: true
    cmds:
      - |
        set -e
        echo "Deploying support to cluster..."
        kubectl apply -k config/overlays/dev/
        echo "Waiting for cert-manager ClusterIssuer to be ready..."
        kubectl wait --for=condition=Ready clusterissuer/support-selfsigned-issuer --timeout=120s
        echo "Waiting for cert-manager issuer to be ready..."
        kubectl wait --for=condition=Ready issuer/support-ca-issuer -n support-system --timeout=120s
        echo "Waiting for TLS certificate to be issued..."
        kubectl wait --for=condition=Ready certificate/support-ca -n support-system --timeout=120s
        kubectl rollout restart deployment/support-apiserver -n support-system 2>/dev/null || true
        if ! kubectl rollout status deployment/support-apiserver -n support-system --timeout=300s; then
          echo ""
          echo "── Pod state ───────────────────────────────────────────"
          kubectl get pods -n support-system -o wide
          echo ""
          echo "── Pod events ──────────────────────────────────────────"
          kubectl describe pods -n support-system -l app=support-apiserver 2>/dev/null | grep -A 40 "^Events:"
          echo ""
          echo "── Crash logs ──────────────────────────────────────────"
          kubectl logs -n support-system -l app=support-apiserver --previous --tail=50 2>/dev/null || \
            kubectl logs -n support-system -l app=support-apiserver --tail=50 2>/dev/null || \
            echo "(no logs available)"
          exit 1
        fi
        echo "✅ Deployed"

  dev:undeploy:
    desc: Remove support from the test cluster
    cmds:
      - kubectl delete -k config/overlays/dev/ --ignore-not-found=true

  dev:logs:
    desc: Stream logs from the support API server
    cmds:
      - kubectl logs -f deployment/support-apiserver -n support-system

  dev:status:
    desc: Check status of the support API server
    cmds:
      - kubectl get apiservice v1alpha1.support.miloapis.com
      - kubectl get pods -n support-system
      - kubectl get supporttickets 2>/dev/null || echo "(no tickets yet)"
      - kubectl get supportmessages 2>/dev/null || echo "(no messages yet)"

  # ── Code Quality ───────────────────────────────────────────────────────────

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet -buildvcs=false ./...

  test:
    desc: Run unit tests
    cmds:
      - go test -buildvcs=false -v ./...

  generate:
    desc: Run code generation (deepcopy, openapi)
    cmds:
      - |
        set -e
        echo "Running deepcopy-gen..."
        go tool k8s.io/code-generator/cmd/deepcopy-gen \
          --output-file zz_generated.deepcopy.go \
          --go-header-file hack/boilerplate.go.txt \
          go.miloapis.com/support/pkg/apis/support/v1alpha1

        echo "Running openapi-gen..."
        go tool k8s.io/kube-openapi/cmd/openapi-gen \
          --output-dir pkg/generated/openapi \
          --output-pkg go.miloapis.com/support/pkg/generated/openapi \
          --go-header-file hack/boilerplate.go.txt \
          go.miloapis.com/support/pkg/apis/support/v1alpha1 \
          k8s.io/apimachinery/pkg/apis/meta/v1 \
          k8s.io/apimachinery/pkg/api/resource \
          k8s.io/apimachinery/pkg/runtime \
          k8s.io/apimachinery/pkg/version

        echo "✅ Code generation complete"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.TOOL_DIR}}

  # ── Demo ───────────────────────────────────────────────────────────────────

  demo:up:
    desc: "Start the full support demo (kind cluster + all components)"
    cmds:
      - task: demo:configure
      - task: demo:cluster-up
      - task: demo:deploy-milo
      - task: demo:deploy-auth
      - task: dev:build
      - task: dev:load-image
      - task: dev:deploy
      - task: demo:register-support-api
      - task: demo:deploy-staff-portal
      - task: demo:deploy-cloud-portal
      - task: demo:seed
      - task: demo:verify
      - task: demo:print-urls

  demo:cluster-up:
    desc: "Create the demo kind cluster and install platform components"
    silent: true
    cmds:
      - |
        set -e
        REPO_DIR="{{.TASKFILE_DIR}}/.test-infra"
        KUBECONFIG_PATH="{{.TASKFILE_DIR}}/{{.KUBECONFIG_FILE}}"

        # Create kind cluster with our config — only maps port 30443, not 30000
        if kind get clusters 2>/dev/null | grep -q "^{{.CLUSTER_NAME}}$"; then
          echo "✅ KIND cluster '{{.CLUSTER_NAME}}' already exists"
        else
          echo "Creating kind cluster '{{.CLUSTER_NAME}}'..."
          kind create cluster \
            --name {{.CLUSTER_NAME}} \
            --image kindest/node:v1.32.0 \
            --config "{{.TASKFILE_DIR}}/hack/kind-config.yaml" \
            --kubeconfig "${KUBECONFIG_PATH}"
          echo "✅ KIND cluster '{{.CLUSTER_NAME}}' created"
        fi

        # Clone or update test-infra for component installation scripts.
        # Check for .git/ not just the directory — a failed clone can leave an
        # empty directory behind, causing the pull path to silently do nothing.
        if [ ! -d "${REPO_DIR}/.git" ]; then
          rm -rf "${REPO_DIR}"
          echo "Cloning test-infra..."
          git clone https://github.com/datum-cloud/test-infra.git "${REPO_DIR}"
        else
          git -C "${REPO_DIR}" pull origin main --quiet 2>/dev/null || true
        fi
        if [ ! -d "${REPO_DIR}/components" ]; then
          echo "ERROR: test-infra clone is missing components/ — delete .test-infra/ and retry"
          exit 1
        fi

        # Export kubeconfig after clone (clone wipes the directory, so this
        # must come after to ensure the file exists for subsequent kubectl calls)
        mkdir -p "$(dirname "${KUBECONFIG_PATH}")"
        kind export kubeconfig --name {{.CLUSTER_NAME}} --kubeconfig "${KUBECONFIG_PATH}"

        # Install platform components directly via kustomize/kubectl rather than
        # delegating to test-infra's task runner (go-task propagates TASKFILE env
        # vars to child processes, causing the wrong Taskfile to be loaded).
        WAIT="300s"

        echo "Installing Flux..."
        kustomize build "${REPO_DIR}/components/flux" | kubectl apply -f -
        kubectl -n flux-system wait deployment/{source-controller,helm-controller,kustomize-controller,notification-controller} --for=condition=Available --timeout="${WAIT}"
        sleep 10

        echo "Installing cert-manager..."
        kustomize build "${REPO_DIR}/components/cert-manager" | kubectl apply -f -
        kubectl -n cert-manager wait helmrelease/{cert-manager,cert-manager-csi-driver} --for=condition=Ready --timeout="${WAIT}"

        echo "Installing Envoy Gateway..."
        kustomize build "${REPO_DIR}/components/envoy-gateway-operator" | kubectl apply -f -
        kubectl -n flux-system wait helmrelease/envoy-gateway --for=condition=Ready --timeout="${WAIT}"
        kustomize build "${REPO_DIR}/components/envoy-gateway-operator/gateway-resources" | kubectl apply -f -
        kubectl wait --for=condition=Programmed gateway/default-gateway -n envoy-gateway-system --timeout="${WAIT}" || true

        echo "✅ Platform components ready"

  demo:deploy-auth:
    desc: "Deploy Dex OIDC provider for demo portal authentication"
    silent: true
    cmds:
      - |
        set -e
        echo "Deploying Dex OIDC provider..."
        kubectl apply -k "{{.TASKFILE_DIR}}/config/demo/auth/"
        echo "Waiting for Dex to be ready..."
        kubectl rollout status deployment/dex -n auth-system --timeout=120s
        echo "✅ Dex OIDC provider ready"
        echo "   Demo user: demo@datum.net / password"
        echo "   Issuer:    https://localhost:30443/dex"

  demo:down:
    desc: "Tear down the demo kind cluster"
    cmds:
      - kind delete cluster --name {{.CLUSTER_NAME}}

  demo:configure:
    desc: "Scaffold demo env files for both portals (edit OIDC secrets before deploying portals)"
    silent: true
    cmds:
      - |
        set -e

        STAFF_ENV="{{.STAFF_PORTAL_DIR}}/config/demo/.env.demo"
        CLOUD_ENV="{{.CLOUD_PORTAL_DIR}}/config/demo/.env.demo"

        # Inject a random session secret if the placeholder is still present
        inject_secret() {
          local file="$1"
          if grep -q "change-me-to-a-random-32-char-secret-value" "$file" 2>/dev/null; then
            local secret
            secret=$(openssl rand -hex 32 2>/dev/null || head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 32)
            sed -i "s/change-me-to-a-random-32-char-secret-value/${secret}/" "$file"
          fi
        }

        inject_secret "${STAFF_ENV}"
        inject_secret "${CLOUD_ENV}"

        echo ""
        echo "╔═══════════════════════════════════════════════════════════╗"
        echo "║  Demo configuration ready                                 ║"
        echo "╚═══════════════════════════════════════════════════════════╝"
        echo ""
        echo "  Staff portal env: ${STAFF_ENV}"
        echo "  Cloud portal env: ${CLOUD_ENV}"
        echo ""
        echo "  OIDC credentials are pre-configured for Dex (deployed by demo:deploy-auth)."
        echo "  Demo login: demo@datum.net / password"
        echo ""

  demo:deploy-milo:
    desc: "Deploy Milo control plane to the demo cluster"
    silent: true
    cmds:
      - |
        set -e
        echo "Deploying Milo to demo cluster..."

        # Clone Milo if not already cached
        if [ ! -d "{{.MILO_DIR}}/.git" ]; then
          rm -rf "{{.MILO_DIR}}"
          echo "Cloning Milo..."
          git clone https://github.com/datum-cloud/milo.git "{{.MILO_DIR}}"
        fi

        cd "{{.MILO_DIR}}"

        # test-infra's kubectl wrapper checks for .test-infra/kubeconfig relative
        # to its working dir (milo's dir). Copy our cluster's kubeconfig there.
        mkdir -p .test-infra
        cp "{{.TASKFILE_DIR}}/{{.KUBECONFIG_FILE}}" .test-infra/kubeconfig

        TASK_X_REMOTE_TASKFILES=1 task dev:build --force
        kind load docker-image ghcr.io/datum-cloud/milo:dev --name {{.CLUSTER_NAME}}
        TASK_X_REMOTE_TASKFILES=1 task dev:deploy
        echo "✅ Milo deployed"

  demo:register-support-api:
    desc: "Register the support API server as an aggregated APIService in the Milo cluster"
    silent: true
    cmds:
      - |
        set -e
        MILO_KUBECONFIG="{{.MILO_DIR}}/.milo/kubeconfig"
        echo "Registering support APIService in Milo cluster..."
        kubectl --kubeconfig "${MILO_KUBECONFIG}" apply -f - <<'EOF'
        apiVersion: apiregistration.k8s.io/v1
        kind: APIService
        metadata:
          name: v1alpha1.support.miloapis.com
        spec:
          service:
            name: support-apiserver
            namespace: support-system
            port: 443
          group: support.miloapis.com
          version: v1alpha1
          insecureSkipTLSVerify: true
          groupPriorityMinimum: 1000
          versionPriority: 15
        EOF
        kubectl --kubeconfig "${MILO_KUBECONFIG}" wait \
          --for=jsonpath='{.status.conditions[?(@.type=="Available")].status}=True' \
          apiservice/v1alpha1.support.miloapis.com --timeout=60s 2>/dev/null || true
        echo "✅ Support APIService registered in Milo cluster"

  demo:deploy-staff-portal:
    desc: "Build, load, and deploy the staff portal (demo overlay) to the demo cluster"
    silent: true
    cmds:
      - |
        set -e
        echo "Building staff-portal image..."
        docker build \
          --cache-from ghcr.io/datum-cloud/staff-portal:demo \
          -t ghcr.io/datum-cloud/staff-portal:demo \
          "{{.STAFF_PORTAL_DIR}}"
        echo "Loading staff-portal image into kind cluster..."
        kind load docker-image ghcr.io/datum-cloud/staff-portal:demo --name {{.CLUSTER_NAME}}
        kubectl apply -k "{{.STAFF_PORTAL_DIR}}/config/demo/"
        kubectl rollout restart deployment/staff-portal 2>/dev/null || true
        kubectl rollout status deployment/staff-portal --timeout=120s 2>/dev/null || true
        echo "✅ Staff portal deployed → https://staff.localhost:30443"

  demo:deploy-cloud-portal:
    desc: "Build, load, and deploy the cloud portal (demo overlay) to the demo cluster"
    silent: true
    cmds:
      - |
        echo "Building cloud-portal image..."
        if ! docker build \
          --cache-from ghcr.io/datum-cloud/cloud-portal:demo \
          -t ghcr.io/datum-cloud/cloud-portal:demo \
          "{{.CLOUD_PORTAL_DIR}}"; then
          echo "⚠  cloud-portal build failed — skipping portal deployment."
          echo "   The staff portal and support API are still available."
          exit 0
        fi
        echo "Loading cloud-portal image into kind cluster..."
        kind load docker-image ghcr.io/datum-cloud/cloud-portal:demo --name {{.CLUSTER_NAME}}
        kubectl apply -k "{{.CLOUD_PORTAL_DIR}}/config/demo/"
        kubectl rollout restart deployment/cloud-portal 2>/dev/null || true
        kubectl rollout status deployment/cloud-portal --timeout=120s 2>/dev/null || true
        echo "✅ Cloud portal deployed → https://cloud.localhost:30443"

  demo:seed:
    desc: "Create demo support tickets and messages"
    silent: true
    cmds:
      - |
        set -e
        echo "Seeding demo data..."

        kubectl apply -f - <<'EOF'
        apiVersion: support.miloapis.com/v1alpha1
        kind: SupportTicket
        metadata:
          name: demo-ticket-001
        spec:
          title: "Cannot access project dashboard"
          description: |
            Getting 403 Forbidden errors when navigating to the project dashboard.
            This started happening after I updated my organization settings yesterday.
            Steps to reproduce:
            1. Log into cloud portal
            2. Navigate to any project
            3. Observe 403 error
          status: open
          priority: high
          visibility: all-staff
          organizationRef:
            kind: Organization
            name: acme-corp
          reporterRef:
            name: jane-doe
            displayName: "Jane Doe"
            email: jane@acme-corp.example
          tags:
            - access
            - dashboard
        EOF

        kubectl apply -f - <<'EOF'
        apiVersion: support.miloapis.com/v1alpha1
        kind: SupportTicket
        metadata:
          name: demo-ticket-002
        spec:
          title: "Billing invoice shows incorrect amount"
          description: |
            Our last invoice (March 2026) shows charges for resources we decommissioned in February.
            The extra charges amount to approximately $240 USD.
          status: in-progress
          priority: medium
          visibility: all-staff
          organizationRef:
            kind: Organization
            name: acme-corp
          reporterRef:
            name: bob-smith
            displayName: "Bob Smith"
            email: bob@acme-corp.example
          ownerRef:
            name: alice-support
            displayName: "Alice (Support)"
            email: alice@datum.net
          tags:
            - billing
            - invoicing
        EOF

        kubectl apply -f - <<'EOF'
        apiVersion: support.miloapis.com/v1alpha1
        kind: SupportMessage
        metadata:
          name: demo-msg-001
        spec:
          ticketRef: demo-ticket-001
          body: |
            Hi Jane,

            Thanks for reaching out! I've reproduced the 403 error on our end. This appears to be related to
            a permissions migration we ran last night. I'm working on a fix now and will update you shortly.

            Best,
            Alice (Support Team)
          authorRef:
            name: alice-support
            displayName: "Alice (Support)"
            email: alice@datum.net
          authorType: staff
          internal: false
        EOF

        kubectl apply -f - <<'EOF'
        apiVersion: support.miloapis.com/v1alpha1
        kind: SupportMessage
        metadata:
          name: demo-msg-002
        spec:
          ticketRef: demo-ticket-001
          body: |
            Internal note: This is caused by the org-settings migration script not backfilling
            project-level permissions. Tracked in INFRA-4521. ETA: 2 hours.
          authorRef:
            name: alice-support
            displayName: "Alice (Support)"
            email: alice@datum.net
          authorType: staff
          internal: true
        EOF

        # Grant demo user staff access via Milo IAM (uses Milo cluster kubeconfig)
        MILO_KUBECONFIG="{{.MILO_DIR}}/.milo/kubeconfig"

        # Create demo user in Milo using the Dex userID as the name
        # demo@datum.net has Dex userID: 08a8684b-db88-4b73-90a9-3cd1661f5466
        kubectl --kubeconfig "${MILO_KUBECONFIG}" apply -f - <<'EOF'
        apiVersion: iam.miloapis.com/v1alpha1
        kind: User
        metadata:
          name: 08a8684b-db88-4b73-90a9-3cd1661f5466
        spec:
          email: demo@datum.net
          givenName: Demo
          familyName: User
        EOF

        kubectl --kubeconfig "${MILO_KUBECONFIG}" apply -f - <<'EOF'
        apiVersion: iam.miloapis.com/v1alpha1
        kind: Group
        metadata:
          name: staff-users
          namespace: milo-system
        EOF

        kubectl --kubeconfig "${MILO_KUBECONFIG}" apply -f - <<'EOF'
        apiVersion: iam.miloapis.com/v1alpha1
        kind: GroupMembership
        metadata:
          name: demo-staff
          namespace: milo-system
        spec:
          groupRef:
            name: staff-users
            namespace: milo-system
          userRef:
            # demo@datum.net (Dex userID used as Milo user name)
            name: 08a8684b-db88-4b73-90a9-3cd1661f5466
        EOF

        echo "✅ Demo data seeded"
        kubectl get supporttickets
        kubectl get supportmessages

  demo:verify:
    desc: "Verify the demo is working end-to-end"
    silent: true
    cmds:
      - |
        PASS=true

        echo ""
        echo "── APIService ──────────────────────────────────────────"
        AVAIL=$(kubectl get apiservice v1alpha1.support.miloapis.com \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "Unknown")
        if [ "${AVAIL}" = "True" ]; then
          echo "  ✅ v1alpha1.support.miloapis.com  Available=True"
        else
          echo "  ❌ v1alpha1.support.miloapis.com  Available=${AVAIL}"
          PASS=false
        fi

        echo ""
        echo "── Support API Server ──────────────────────────────────"
        kubectl get pods -n support-system --no-headers 2>/dev/null | while read line; do
          echo "  $line"
        done

        echo ""
        echo "── Tickets ─────────────────────────────────────────────"
        TICKET_COUNT=$(kubectl get supporttickets --no-headers 2>/dev/null | wc -l | tr -d ' ')
        if [ "${TICKET_COUNT}" -gt "0" ]; then
          echo "  ✅ ${TICKET_COUNT} ticket(s) found"
          kubectl get supporttickets 2>/dev/null
        else
          echo "  ⚠  No tickets yet (run 'task demo:seed')"
        fi

        echo ""
        echo "── Messages ────────────────────────────────────────────"
        MSG_COUNT=$(kubectl get supportmessages --no-headers 2>/dev/null | wc -l | tr -d ' ')
        if [ "${MSG_COUNT}" -gt "0" ]; then
          echo "  ✅ ${MSG_COUNT} message(s) found"
        else
          echo "  ⚠  No messages yet"
        fi

        echo ""
        echo "── HTTPRoutes ──────────────────────────────────────────"
        kubectl get httproutes --all-namespaces 2>/dev/null | grep -E "staff-portal|cloud-portal" | while read line; do
          echo "  $line"
        done

        echo ""
        if [ "$PASS" = "true" ]; then
          echo "  ✅ Demo verification passed"
        else
          echo "  ❌ Demo verification failed — check 'task dev:logs' for details"
        fi
        echo ""

  demo:logs:
    desc: "Stream logs from all support demo components"
    cmds:
      - |
        echo "Streaming logs (Ctrl-C to stop)..."
        kubectl logs -f deployment/support-apiserver -n support-system &
        PID1=$!
        kubectl logs -f deployment/staff-portal 2>/dev/null &
        PID2=$!
        kubectl logs -f deployment/cloud-portal 2>/dev/null &
        PID3=$!
        trap "kill $PID1 $PID2 $PID3 2>/dev/null" EXIT
        wait

  demo:print-urls:
    desc: "Print URLs for the demo"
    silent: true
    cmds:
      - |
        echo ""
        echo "╔═══════════════════════════════════════════════════════════╗"
        echo "║  Support Demo — Access URLs                               ║"
        echo "╠═══════════════════════════════════════════════════════════╣"
        echo "║                                                           ║"
        echo "║  Staff Portal  →  https://staff.localhost:30443           ║"
        echo "║  Cloud Portal  →  https://cloud.localhost:30443           ║"
        echo "║  Support API   →  https://localhost:30443/apis/           ║"
        echo "║                     support.miloapis.com/v1alpha1/        ║"
        echo "║                                                           ║"
        echo "╠═══════════════════════════════════════════════════════════╣"
        echo "║  Add to /etc/hosts:                                       ║"
        echo "║    127.0.0.1  staff.localhost cloud.localhost             ║"
        echo "╠═══════════════════════════════════════════════════════════╣"
        echo "║  Demo login (portal authentication):                      ║"
        echo "║    Email:    demo@datum.net                               ║"
        echo "║    Password: password                                     ║"
        echo "╠═══════════════════════════════════════════════════════════╣"
        echo "║  Quick checks:                                            ║"
